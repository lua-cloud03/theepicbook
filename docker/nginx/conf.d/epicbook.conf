limit_req_zone $binary_remote_addr zone=docker_epicbook_api:10m rate=10r/s;

upstream docker_epicbook_app {
  server app:8080;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: https:;" always;

  location /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  location /api/ {
    limit_req zone=docker_epicbook_api burst=20 nodelay;
    proxy_pass http://docker_epicbook_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location / {
    proxy_pass http://docker_epicbook_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }
}
