services:
  proxy:
    image: docker-epicbook-proxy:local
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: docker-epicbook-proxy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${PROXY_HTTP_PORT:-8081}:80"
    volumes:
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    networks:
      - docker-epicbook-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: docker-epicbook-app:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker-epicbook-app
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8080}
      APP_NAME: ${APP_NAME:-docker-epicbook}
      APP_LOG_DIR: ${APP_LOG_DIR:-/app/logs}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-bookstore}
      DB_USER: ${DB_USER:-epicbook}
      DB_PASSWORD: ${DB_PASSWORD:-epicbookpass}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - docker-epicbook-app-logs:/app/logs
    restart: unless-stopped
    networks:
      - docker-epicbook-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: mysql:8.0
    container_name: docker-epicbook-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME:-bookstore}
      MYSQL_USER: ${DB_USER:-epicbook}
      MYSQL_PASSWORD: ${DB_PASSWORD:-epicbookpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - docker-epicbook-db-data:/var/lib/mysql
      - ./db/BuyTheBook_Schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/author_seed.sql:/docker-entrypoint-initdb.d/02-author-seed.sql:ro
      - ./db/books_seed.sql:/docker-entrypoint-initdb.d/03-books-seed.sql:ro
    restart: unless-stopped
    networks:
      - docker-epicbook-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-rootpass} --silent"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  docker-epicbook-net:
    name: docker-epicbook-net

volumes:
  docker-epicbook-db-data:
    name: docker-epicbook-db-data
  docker-epicbook-app-logs:
    name: docker-epicbook-app-logs
