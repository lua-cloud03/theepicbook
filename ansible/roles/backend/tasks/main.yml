---
- name: Install backend OS packages
  ansible.builtin.apt:
    name:
      - mysql-client
    state: present
    update_cache: true

- name: Clone EpicBook app source onto backend
  ansible.builtin.git:
    repo: "{{ epicbook_repo_url }}"
    dest: "{{ app_root }}"
    version: "{{ epicbook_repo_version }}"
    force: true
  become_user: "{{ app_user }}"

- name: Write backend Sequelize config
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ app_root }}/config/config.json"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Ensure DB marker directory exists
  ansible.builtin.file:
    path: /var/lib/epicbook
    state: directory
    mode: "0755"

- name: Import EpicBook schema into RDS
  ansible.builtin.shell: |
    mysql -h {{ epicbook_db_host }} -u{{ epicbook_db_username }} -p'{{ epicbook_db_password }}' {{ epicbook_database }} < db/BuyTheBook_Schema.sql
  args:
    chdir: "{{ app_root }}"
    creates: /var/lib/epicbook/schema.loaded

- name: Import author seed data into RDS
  ansible.builtin.shell: |
    mysql -h {{ epicbook_db_host }} -u{{ epicbook_db_username }} -p'{{ epicbook_db_password }}' {{ epicbook_database }} < db/author_seed.sql
  args:
    chdir: "{{ app_root }}"
    creates: /var/lib/epicbook/author.seeded

- name: Import book seed data into RDS
  ansible.builtin.shell: |
    mysql -h {{ epicbook_db_host }} -u{{ epicbook_db_username }} -p'{{ epicbook_db_password }}' {{ epicbook_database }} < db/books_seed.sql
  args:
    chdir: "{{ app_root }}"
    creates: /var/lib/epicbook/books.seeded

- name: Mark schema import complete
  ansible.builtin.file:
    path: /var/lib/epicbook/schema.loaded
    state: touch
    mode: "0644"

- name: Mark author seed import complete
  ansible.builtin.file:
    path: /var/lib/epicbook/author.seeded
    state: touch
    mode: "0644"

- name: Mark books seed import complete
  ansible.builtin.file:
    path: /var/lib/epicbook/books.seeded
    state: touch
    mode: "0644"

- name: Install Node.js dependencies
  ansible.builtin.command: npm install
  args:
    chdir: "{{ app_root }}"
  become_user: "{{ app_user }}"

- name: Write PM2 ecosystem file
  ansible.builtin.template:
    src: pm2-ecosystem.config.js.j2
    dest: "{{ app_root }}/ecosystem.config.js"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Start EpicBook with PM2
  ansible.builtin.command: pm2 start ecosystem.config.js --only epicbook --update-env
  args:
    chdir: "{{ app_root }}"
  become_user: "{{ app_user }}"

- name: Save PM2 process list
  ansible.builtin.command: pm2 save
  become_user: "{{ app_user }}"

- name: Wait for EpicBook app port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ epicbook_port }}"
    delay: 2
    timeout: 60

- name: Verify EpicBook app responds locally
  ansible.builtin.uri:
    url: "{{ epicbook_verify_url }}"
    status_code: 200
